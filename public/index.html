<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados das Loterias</title>

  <style>
    :root{
      --bg:#020617;

<body>

<header>
  <h1>Resultados das Loterias</h1>
  <div class="sub">Atualização automática via Firebase</div>
</header>

<main>

  <div class="toolbar">
    <div class="status" id="status">
      Carregando resultados...
    </div>

    <button onclick="location.reload()">
      Atualizar tela
    </button>
  </div>

  <section id="results" class="grid"></section>

</main>

<footer>
  Site informativo. Não realiza apostas.
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6iyfXbCt-fHL5Wt5zNS5myKq-njJzbms",
  authDomain: "resultados-loterias-3979a.firebaseapp.com",
  projectId: "resultados-loterias-3979a",
  storageBucket: "resultados-loterias-3979a.firebasestorage.app",
  messagingSenderId: "109416331388",
  appId: "1:109416331388:web:8e04783520d08adc87b1f9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const resultsEl = document.getElementById("results");
const statusEl = document.getElementById("status");

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[s]));
}

function render(docs){

  if(!docs.length){

    resultsEl.innerHTML =
    `<div class="empty">Nenhum resultado encontrado ainda.</div>`;

    statusEl.textContent = "Aguardando primeira coleta...";

    return;
  }

  statusEl.textContent =
  "Última atualização: " + new Date().toLocaleString("pt-BR");

  resultsEl.innerHTML = docs.map(item => {

    let premios = [];

    try {

      premios = typeof item.premios === "string"
      ? JSON.parse(item.premios)
      : Array.isArray(item.premios)
      ? item.premios
      : [];

    } catch (e) {

      premios = [];

    }

    return `
      <article class="card">

        <h2>
          ${escapeHtml(item.titulo || "Resultado")}
        </h2>

        <div class="meta">
          ${escapeHtml(item.data || "")}

          ${item.fonte
            ? " • Fonte: " + escapeHtml(item.fonte)
            : ""}
        </div>

        <table>

          <thead>
            <tr>
              <th>Prêmio</th>
              <th>Milhar</th>
              <th>Bicho</th>
            </tr>
          </thead>

          <tbody>

            ${premios.map((p, i) => `

              <tr>
                <td>
                  ${escapeHtml(p.posicao || (i + 1) + "º")}
                </td>

                <td class="milhar">
                  ${escapeHtml(p.milhar || "")}
                </td>

                <td>
                  ${escapeHtml(p.bicho || "")}
                </td>
              </tr>

            `).join("")}

          </tbody>

        </table>

      </article>
    `;

  }).join("");

}

const q = query(collection(db, "resultados"));

onSnapshot(q, snap => {

  const docs = snap.docs.map(d => ({
    id:d.id,
    ...d.data()
  }));

  render(docs);

}, err => {

  console.error(err);

  statusEl.textContent =
  "Erro ao carregar. Confira Firebase Config e regras.";

});

</script>

</body>
</html>
