<style>

<body>
<div class="container">

  <section class="hero">
    <div class="kicker">Painel automático</div>

    <h1>Resultados <span>Kelly Menezes JB</span></h1>

    <p>
      <strong>Chama no Milhar</strong> • resultados organizados por loteria, horário e atualização
    </p>

    <div class="badges">
      <div class="badge">Tempo real</div>
      <div class="badge">Por loteria</div>
      <div class="badge">Histórico 24h</div>
    </div>
  </section>

  <section class="topbar">
    <div class="controls">
      <div class="selectWrap">
        <select id="loteriaSelect">
          <option value="todas">Todas as loterias</option>
        </select>
      </div>

      <button onclick="aplicarFiltro()">Atualizar tela</button>
    </div>

    <div class="tags" id="tags"></div>

    <div class="status" id="status">Carregando resultados...</div>
  </section>

  <main class="grid" id="gridResultados"></main>

  <footer>© Kelly Menezes JB • Resultados automáticos</footer>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6iyfXbCt-fHL5Wt5zNS5myKq-njJzbms",
  authDomain: "resultados-loterias-3979a.firebaseapp.com",
  projectId: "resultados-loterias-3979a",
  storageBucket: "resultados-loterias-3979a.firebasestorage.app",
  messagingSenderId: "109416331388",
  appId: "1:109416331388:web:8e04783520d08adc87b1f9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("gridResultados");
const statusEl = document.getElementById("status");
const select = document.getElementById("loteriaSelect");
const tags = document.getElementById("tags");

let todosResultados = [];

function escapeHtml(texto){
  return String(texto || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function normalizar(texto){
  return String(texto || "")
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function ordem(item){
  const dataOrdenacao = Number(item.dataOrdenacao || 0);
  const createdAt = Number(item.createdAt || 0);
  const atualizado = Number(item.atualizado || 0);
  return dataOrdenacao || atualizado || createdAt || 0;
}

function limparDocumentosInvalidos(lista){
  return lista.filter(item => {
    const titulo = String(item.titulo || "").toLowerCase();
    const loteria = String(item.loteria || "").toLowerCase();

    if(!item.loteria) return false;
    if(!item.premios) return false;
    if(!titulo.includes("resultado do dia")) return false;

    const lixo = ["function","window","document","print","script","__","const ","var "];

    for(const palavra of lixo){
      if(titulo.includes(palavra)) return false;
      if(loteria.includes(palavra)) return false;
    }

    return true;
  });
}

function renderizar(lista){
  lista = [...lista].sort((a,b)=>ordem(b)-ordem(a));

  if(!lista.length){
    grid.innerHTML = `<div class="empty">Nenhum resultado encontrado.</div>`;
    return;
  }

  grid.innerHTML = lista.map(item => {
    let premios = [];

    try{
      premios = typeof item.premios === "string"
        ? JSON.parse(item.premios)
        : Array.isArray(item.premios)
          ? item.premios
          : [];
    }catch(e){
      premios = [];
    }

    return `
      <article class="card">
        <div class="cardHeader">
          <h2>${escapeHtml(item.titulo)}</h2>
          <div class="timePill">${escapeHtml(item.hora || "Sem horário")}</div>
        </div>

        <div class="info">
          <div class="infoItem">
            <span class="infoLabel">Loteria</span>
            <span class="infoValue loteriaNome">${escapeHtml(item.loteria || "")}</span>
          </div>

          <div class="infoItem">
            <span class="infoLabel">Data</span>
            <span class="infoValue">${escapeHtml(item.data || "")}</span>
          </div>

          <div class="infoItem">
            <span class="infoLabel">Horário</span>
            <span class="infoValue">${escapeHtml(item.hora || "")}</span>
          </div>

          <div class="infoItem">
            <span class="infoLabel">Atualização</span>
            <span class="infoValue">${escapeHtml(item.atualizadoFonte || "")}</span>
          </div>
        </div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Prêmio</th>
                <th>Milhar</th>
                <th>Bicho</th>
              </tr>
            </thead>

            <tbody>
              ${premios.map(p => `
                <tr>
                  <td>${escapeHtml(p.posicao || "")}</td>
                  <td class="milhar">${escapeHtml(p.milhar || "")}</td>
                  <td>${escapeHtml(p.bicho || "")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </article>
    `;
  }).join("");
}

window.aplicarFiltro = function(){
  const valor = select.value;

  if(valor === "todas"){
    renderizar(todosResultados);
    return;
  }

  const filtrados = todosResultados.filter(item =>
    normalizar(item.loteria) === normalizar(valor)
  );

  renderizar(filtrados);
};

window.filtrarRapido = function(nome, el){
  document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  select.value = nome;
  aplicarFiltro();
};

function montarFiltros(){
  const loterias = [...new Set(todosResultados.map(r => r.loteria).filter(Boolean))].sort();
  const valorAtual = select.value;

  select.innerHTML = `<option value="todas">Todas as loterias</option>`;

  loterias.forEach(nome => {
    const opt = document.createElement("option");
    opt.value = nome;
    opt.textContent = nome;
    select.appendChild(opt);
  });

  if(valorAtual === "todas" || loterias.includes(valorAtual)){
    select.value = valorAtual;
  }

  const principais = [
    "todas",
    "PT-SP",
    "PT-RIO",
    "LOOK LOTERIAS",
    "BANDEIRANTES",
    "LOTECE",
    "MALUCA BAHIA",
    "BOA SORTE GOIÁS"
  ];

  tags.innerHTML = principais.map((nome, i) => `
    <div class="tag ${i === 0 ? "active" : ""}" onclick="filtrarRapido('${nome}', this)">
      <span>${nome === "todas" ? "Todas" : nome}</span>
    </div>
  `).join("");
}

select.addEventListener("change", aplicarFiltro);

const q = query(collection(db, "resultados"));

onSnapshot(q, snap => {
  todosResultados = limparDocumentosInvalidos(
    snap.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }))
  );

  montarFiltros();

  statusEl.innerHTML =
    "Última atualização da tela: " + new Date().toLocaleString("pt-BR");

  aplicarFiltro();
}, err => {
  console.error(err);
  statusEl.textContent = "Erro ao carregar resultados.";
});
</script>

</body>
</html>
