```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resultados Kelly Menezes JB</title>

<style>
:root{
  --bg:#020617;
  --bg2:#04142b;
  --card:#071b38;
  --card2:#0c2952;
  --blue:#00c8ff;
  --green:#39ff9b;
  --white:#ffffff;
  --muted:#9db3cf;
  --line:rgba(255,255,255,.10);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top,#063970 0%,#020617 40%,#000 100%);
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(0,200,255,.15),transparent 30%),
    radial-gradient(circle at 80% 30%,rgba(57,255,155,.08),transparent 30%);
  pointer-events:none;
}

.container{
  width:min(1450px,95%);
  margin:auto;
  padding:20px 0 60px;
}

.hero{
  background:linear-gradient(180deg,#031225,#000814);
  border:1px solid rgba(0,200,255,.20);
  border-radius:35px;
  padding:35px 20px;
  text-align:center;
  box-shadow:
    0 0 60px rgba(0,200,255,.10),
    inset 0 0 60px rgba(0,200,255,.04);
  margin-bottom:22px;
}

.hero h1{
  font-size:clamp(40px,6vw,75px);
  font-weight:900;
  line-height:1;
}

.hero h1 span{
  color:var(--blue);
  text-shadow:
    0 0 10px rgba(0,200,255,.8),
    0 0 30px rgba(0,200,255,.5);
}

.hero p{
  color:var(--green);
  margin-top:18px;
  font-size:23px;
  font-weight:700;
  text-shadow:0 0 10px rgba(57,255,155,.4);
}

.badges{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}

.badge{
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#001018;
  padding:14px 22px;
  border-radius:999px;
  font-weight:900;
  box-shadow:0 0 20px rgba(0,200,255,.25);
}

.topbar{
  background:rgba(0,0,0,.45);
  border:1px solid rgba(0,200,255,.15);
  border-radius:30px;
  padding:16px;
  margin-bottom:22px;
  backdrop-filter:blur(10px);
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

select{
  flex:1;
  min-width:250px;
  background:#08192f;
  border:1px solid rgba(0,200,255,.25);
  color:white;
  padding:18px;
  border-radius:18px;
  font-size:18px;
  outline:none;
}

button{
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#001018;
  border:none;
  border-radius:18px;
  padding:18px 28px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 0 25px rgba(0,200,255,.25);
}

button:hover{
  transform:translateY(-2px) scale(1.02);
}

.filtros{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.tag{
  padding:12px 18px;
  border-radius:999px;
  border:1px solid rgba(0,200,255,.25);
  background:#07172d;
  color:white;
  cursor:pointer;
  font-weight:800;
  transition:.25s;
}

.tag:hover,
.tag.active{
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#001018;
}

.status{
  text-align:center;
  color:var(--muted);
  margin-top:14px;
  font-size:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
  gap:18px;
}

.card{
  background:
    linear-gradient(180deg,rgba(9,31,58,.95),rgba(3,16,35,.96));
  border:1px solid rgba(0,200,255,.14);
  border-radius:34px;
  padding:22px;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 35px rgba(0,200,255,.06),
    inset 0 0 20px rgba(0,200,255,.03);
  animation:fade .35s ease;
}

.card::before{
  content:"";
  position:absolute;
  top:-100px;
  right:-100px;
  width:240px;
  height:240px;
  background:radial-gradient(circle,rgba(0,200,255,.18),transparent 70%);
}

.card h2{
  font-size:22px;
  line-height:1.35;
  margin-bottom:14px;
  color:white;
  padding-right:20px;
}

.card h2::before{
  content:"●";
  color:var(--green);
  margin-right:10px;
  text-shadow:0 0 12px rgba(57,255,155,.8);
}

.info{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  padding:14px;
  border-radius:18px;
  color:var(--muted);
  margin-bottom:16px;
  line-height:1.7;
}

.loteriaNome{
  color:var(--green);
  font-weight:900;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 12px;
}

th{
  text-align:left;
  color:var(--blue);
  font-size:14px;
  padding:0 12px;
}

td{
  background:rgba(255,255,255,.04);
  padding:16px 12px;
  font-size:18px;
}

td:first-child{
  border-radius:16px 0 0 16px;
  color:var(--green);
  font-weight:900;
}

td:last-child{
  border-radius:0 16px 16px 0;
}

.milhar{
  font-size:22px;
  font-weight:900;
  color:white;
  text-shadow:
    0 0 10px rgba(255,255,255,.9),
    0 0 20px rgba(255,255,255,.5);
}

.empty{
  text-align:center;
  padding:70px 20px;
  color:var(--muted);
  font-size:22px;
}

footer{
  text-align:center;
  color:#7f97b6;
  margin-top:40px;
  font-size:14px;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(15px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media(max-width:700px){

  .grid{
    grid-template-columns:1fr;
  }

  .hero h1{
    font-size:45px;
  }

  .hero p{
    font-size:18px;
  }

  .card{
    padding:18px;
  }

  td{
    font-size:15px;
  }

  .milhar{
    font-size:20px;
  }

}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>
    Resultados <span>Kelly Menezes JB</span>
  </h1>

  <p>
    Chama no Milhar • Fé no Pai
  </p>

  <div class="badges">
    <div class="badge">Tempo Real</div>
    <div class="badge">Histórico</div>
    <div class="badge">1º ao 5º prêmio</div>
  </div>
</div>

<div class="topbar">

  <div class="controls">
    <select id="loteriaSelect">
      <option value="todas">Todas as loterias</option>
    </select>

    <button onclick="carregarResultados()">
      Atualizar
    </button>
  </div>

  <div class="filtros">
    <div class="tag active" onclick="filtrarRapido('todas',this)">Todas</div>
    <div class="tag" onclick="filtrarRapido('PT-SP',this)">PT-SP</div>
    <div class="tag" onclick="filtrarRapido('PT-RIO',this)">PT-RIO</div>
    <div class="tag" onclick="filtrarRapido('LOOK LOTERIAS',this)">LOOK</div>
    <div class="tag" onclick="filtrarRapido('BANDEIRANTES',this)">BANDEIRANTES</div>
    <div class="tag" onclick="filtrarRapido('LOTECE',this)">LOTECE</div>
    <div class="tag" onclick="filtrarRapido('MALUCA BAHIA',this)">MALUCA</div>
    <div class="tag" onclick="filtrarRapido('BOA SORTE GOIÁS',this)">BOA SORTE</div>
  </div>

  <div class="status" id="status">
    Carregando resultados...
  </div>

</div>

<div class="grid" id="gridResultados"></div>

<footer>
  © Kelly Menezes JB • Resultados automáticos em tempo real
</footer>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyC6iyfXbCt-fHL5Wt5zNS5myKq-njJzbms",

  authDomain: "resultados-loterias-3979a.firebaseapp.com",

  projectId: "resultados-loterias-3979a",

  storageBucket: "resultados-loterias-3979a.firebasestorage.app",

  messagingSenderId: "109416331388",

  appId: "1:109416331388:web:8e04783520d08adc87b1f9"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("gridResultados");
const statusEl = document.getElementById("status");
const select = document.getElementById("loteriaSelect");

let todosResultados = [];

function escapeHtml(texto){

  return String(texto || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");

}

function normalizar(texto){

  return String(texto || "")
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();

}

function parseDataHora(item){

  const data = String(item.data || "");
  const hora = String(item.hora || "");

  const d = data.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  const h = hora.match(/(\d{2}):(\d{2})/);

  if(!d || !h) return 0;

  return new Date(
    `${d[3]}-${d[2]}-${d[1]}T${h[1]}:${h[2]}:00`
  ).getTime();

}

function renderizar(lista){

  if(!lista.length){

    grid.innerHTML = `
      <div class="empty">
        Nenhum resultado encontrado.
      </div>
    `;

    return;
  }

  lista.sort((a,b)=>parseDataHora(b)-parseDataHora(a));

  grid.innerHTML = lista.map(item=>{

    let premios = [];

    try{

      premios = typeof item.premios === "string"
        ? JSON.parse(item.premios)
        : item.premios;

    }catch(e){
      premios = [];
    }

    return `
      <div class="card">

        <h2>
          ${escapeHtml(item.titulo)}
        </h2>

        <div class="info">
          Loteria:
          <span class="loteriaNome">
            ${escapeHtml(item.loteria || "")}
          </span>
          <br>
          Data do resultado:
          ${escapeHtml(item.data || "")}
          <br>
          Horário:
          ${escapeHtml(item.hora || "")}
          <br>
          Última atualização:
          ${escapeHtml(item.atualizadoFonte || "")}
        </div>

        <table>

          <thead>
            <tr>
              <th>PRÊMIO</th>
              <th>MILHAR</th>
              <th>BICHO</th>
            </tr>
          </thead>

          <tbody>

            ${premios.map(p=>`

              <tr>

                <td>
                  ${escapeHtml(p.posicao)}
                </td>

                <td class="milhar">
                  ${escapeHtml(p.milhar)}
                </td>

                <td>
                  ${escapeHtml(p.bicho)}
                </td>

              </tr>

            `).join("")}

          </tbody>

        </table>

      </div>
    `;

  }).join("");

}

window.filtrarRapido = function(nome,el){

  document.querySelectorAll(".tag")
    .forEach(t=>t.classList.remove("active"));

  el.classList.add("active");

  select.value = nome;

  aplicarFiltro();

}

function aplicarFiltro(){

  const valor = select.value;

  if(valor === "todas"){

    renderizar(todosResultados);

    return;
  }

  const filtrados = todosResultados.filter(item => {

    const loteria =
      normalizar(item.loteria || "");

    return loteria === normalizar(valor);

  });

  renderizar(filtrados);

}

select.addEventListener("change", aplicarFiltro);

window.carregarResultados = function(){

  statusEl.innerHTML =
    "Atualizando resultados...";

  aplicarFiltro();

}

const q = query(
  collection(db,"resultados")
);

onSnapshot(q,(snap)=>{

  todosResultados = snap.docs

    .map(doc => ({
      id: doc.id,
      ...doc.data()
    }))

    .filter(item => {

      const titulo =
        String(item.titulo || "")
        .toLowerCase();

      const loteria =
        String(item.loteria || "")
        .toLowerCase();

      if(!item.loteria) return false;
      if(!titulo.includes("resultado")) return false;

      if(titulo.includes("function")) return false;
      if(titulo.includes("window")) return false;
      if(titulo.includes("document")) return false;
      if(titulo.includes("print")) return false;
      if(titulo.includes("__")) return false;

      if(loteria.includes("function")) return false;
      if(loteria.includes("window")) return false;

      return true;

    });

  const loterias = [
    ...new Set(
      todosResultados
        .map(r => r.loteria)
        .filter(Boolean)
    )
  ].sort();

  const valorAtual = select.value;

  select.innerHTML = `
    <option value="todas">
      Todas as loterias
    </option>
  `;

  loterias.forEach(nome=>{

    const opt = document.createElement("option");

    opt.value = nome || "";

    opt.textContent = nome || "Sem nome";

    select.appendChild(opt);

  });

  if(
    valorAtual &&
    (
      valorAtual === "todas" ||
      loterias.includes(valorAtual)
    )
  ){
    select.value = valorAtual;
  }

  statusEl.innerHTML = `
    Última atualização da tela:
    ${new Date().toLocaleString("pt-BR")}
  `;

  aplicarFiltro();

});

</script>

</body>
</html>
