<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Kelly Menezes JB</title>

<style>
:root{
  --bg:#020617;
  --card:#07172d;
  --card2:#0b1f3a;
  --blue:#00c8ff;
  --green:#39ff9b;
  --text:#f8fafc;
  --muted:#9fb3cf;
  --line:rgba(255,255,255,.10);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  background:linear-gradient(180deg,#071936,#020617 45%,#000);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.container{
  width:min(1180px,94%);
  margin:auto;
  padding:22px 0 45px;
}

.hero{
  background:rgba(3,14,30,.88);
  border:1px solid rgba(0,200,255,.16);
  border-radius:26px;
  padding:26px 18px;
  text-align:center;
  margin-bottom:16px;
  box-shadow:0 18px 40px rgba(0,0,0,.32);
}

.hero h1{
  font-size:clamp(30px,5vw,54px);
  font-weight:900;
  line-height:1.05;
}

.hero h1 span{
  color:var(--blue);
}

.hero p{
  margin-top:10px;
  color:var(--muted);
  font-size:16px;
  font-weight:700;
}

.topbar{
  background:rgba(3,14,30,.9);
  border:1px solid var(--line);
  border-radius:22px;
  padding:14px;
  margin-bottom:18px;
  position:sticky;
  top:8px;
  z-index:10;
  backdrop-filter:blur(10px);
}

.controls{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
}

select{
  width:100%;
  background:#08192f;
  color:white;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  padding:14px;
  font-size:15px;
  outline:none;
}

button{
  border:0;
  border-radius:14px;
