<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Kelly Menezes JB</title>

<style>
:root{
  --blue:#00c8ff;
  --green:#39ff9b;
  --muted:#9db3cf;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:radial-gradient(circle at top,#073b75,#020617 45%,#000);
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}
.container{width:min(1450px,95%);margin:auto;padding:22px 0 55px}
.hero{
  background:linear-gradient(180deg,#031225,#000814);
  border:1px solid rgba(0,200,255,.2);
  border-radius:34px;
  padding:34px 18px;
  text-align:center;
  margin-bottom:20px;
  box-shadow:0 0 50px rgba(0,200,255,.12);
}
.hero h1{font-size:clamp(38px,6vw,72px);font-weight:900}
.hero span{color:var(--blue);text-shadow:0 0 20px var(--blue)}
.hero p{color:var(--green);font-size:22px;margin-top:12px;font-weight:900}
.badges{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:18px}
.badge{background:linear-gradient(135deg,var(--blue),var(--green));color:#001018;padding:12px 18px;border-radius:999px;font-weight:900}
.topbar{
  background:rgba(0,0,0,.45);
  border:1px solid rgba(0,200,255,.15);
  border-radius:28px;
  padding:15px;
  margin-bottom:20px;
}
.controls{display:flex;gap:12px;flex-wrap:wrap}
select{
  flex:1;
  min-width:250px;
  background:#08192f;
  border:1px solid rgba(0,200,255,.25);
  color:white;
  padding:17px;
  border-radius:18px;
  font-size:17px;
  outline:none;
}
button{
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#001018;
  border:0;
  border-radius:18px;
  padding:17px 26px;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
}
.tags{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
.tag{
  padding:11px 16px;
  border-radius:999px;
  background:#07172d;
  border:1px solid rgba(0,200,255,.25);
  font-weight:900;
  cursor:pointer;
}
.tag.active,.tag:hover{background:linear-gradient(135deg,var(--blue),var(--green));color:#001018}
.status{text-align:center;color:var(--muted);margin-top:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:18px}
.card{
  background:linear-gradient(180deg,rgba(9,31,58,.96),rgba(3,16,35,.97));
  border:1px solid rgba(0,200,255,.14);
  border-radius:32px;
  padding:21px;
  animation:fade .35s ease;
}
.card h2{font-size:22px;line-height:1.35;margin-bottom:14px}
.card h2::before{content:"●";color:var(--green);margin-right:8px}
.info{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.07);
  padding:13px;
  border-radius:17px;
  color:var(--muted);
  margin-bottom:15px;
  line-height:1.7;
}
.loteriaNome{color:var(--green);font-weight:900}
table{width:100%;border-collapse:separate;border-spacing:0 10px}
th{text-align:left;color:var(--blue);font-size:13px;padding:0 10px}
td{background:rgba(255,255,255,.045);padding:14px 10px;font-size:17px}
td:first-child{border-radius:14px 0 0 14px;color:var(--green);font-weight:900}
td:last-child{border-radius:0 14px 14px 0}
.milhar{font-size:22px;font-weight:900;text-shadow:0 0 12px white}
.empty{text-align:center;padding:55px 10px;color:var(--muted);font-size:22px}
footer{text-align:center;color:#7f97b6;margin-top:35px}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){
  .grid{grid-template-columns:1fr}
  .hero h1{font-size:42px}
  button{width:100%}
}
</style>
</head>

<body>
<div class="container">

<div class="hero">
  <h1>Resultados <span>Kelly Menezes JB</span></h1>
  <p>Chama no Milhar • Fé no Pai</p>
  <div class="badges">
  </div>
</div>

<div class="topbar">
  <div class="controls">
    <select id="loteriaSelect">
      <option value="todas">Todas as loterias</option>
    </select>
    <button onclick="aplicarFiltro()">Atualizar tela</button>
  </div>

  <div class="tags" id="tags"></div>
  <div class="status" id="status">Carregando resultados...</div>
</div>

<div class="grid" id="gridResultados"></div>

<footer>© Kelly Menezes JB • </footer>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6iyfXbCt-fHL5Wt5zNS5myKq-njJzbms",
  authDomain: "resultados-loterias-3979a.firebaseapp.com",
  projectId: "resultados-loterias-3979a",
  storageBucket: "resultados-loterias-3979a.firebasestorage.app",
  messagingSenderId: "109416331388",
  appId: "1:109416331388:web:8e04783520d08adc87b1f9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("gridResultados");
const statusEl = document.getElementById("status");
const select = document.getElementById("loteriaSelect");
const tags = document.getElementById("tags");

let todosResultados = [];

function escapeHtml(texto){
  return String(texto || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function normalizar(texto){
  return String(texto || "")
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function ordem(item){
  const dataOrdenacao = Number(item.dataOrdenacao || 0);
  const createdAt = Number(item.createdAt || 0);
  return dataOrdenacao || createdAt || 0;
}

function limparDocumentosInvalidos(lista){
  return lista.filter(item => {
    const titulo = String(item.titulo || "").toLowerCase();
    const loteria = String(item.loteria || "").toLowerCase();

    if(!item.loteria) return false;
    if(!item.premios) return false;
    if(!titulo.includes("resultado do dia")) return false;

    const lixo = ["function","window","document","print","script","__","const ","var "];

    for(const palavra of lixo){
      if(titulo.includes(palavra)) return false;
      if(loteria.includes(palavra)) return false;
    }

    return true;
  });
}

function renderizar(lista){
  lista = [...lista].sort((a,b)=>ordem(b)-ordem(a));

  if(!lista.length){
    grid.innerHTML = `<div class="empty">Nenhum resultado encontrado.</div>`;
    return;
  }

  grid.innerHTML = lista.map(item => {
    let premios = [];

    try{
      premios = typeof item.premios === "string"
        ? JSON.parse(item.premios)
        : Array.isArray(item.premios)
          ? item.premios
          : [];
    }catch(e){
      premios = [];
    }

    return `
      <div class="card">
        <h2>${escapeHtml(item.titulo)}</h2>

        <div class="info">
          Loteria:
          <span class="loteriaNome">${escapeHtml(item.loteria || "")}</span>
          <br>
          Data: ${escapeHtml(item.data || "")}
          <br>
          Horário: ${escapeHtml(item.hora || "")}
          <br>
          Atualização: ${escapeHtml(item.atualizadoFonte || "")}
        </div>

        <table>
          <thead>
            <tr>
              <th>PRÊMIO</th>
              <th>MILHAR</th>
              <th>BICHO</th>
            </tr>
          </thead>
          <tbody>
            ${premios.map(p => `
              <tr>
                <td>${escapeHtml(p.posicao || "")}</td>
                <td class="milhar">${escapeHtml(p.milhar || "")}</td>
                <td>${escapeHtml(p.bicho || "")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  }).join("");
}

window.aplicarFiltro = function(){
  const valor = select.value;

  if(valor === "todas"){
    renderizar(todosResultados);
    return;
  }

  const filtrados = todosResultados.filter(item =>
    normalizar(item.loteria) === normalizar(valor)
  );

  renderizar(filtrados);
};

window.filtrarRapido = function(nome, el){
  document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  select.value = nome;
  aplicarFiltro();
};

function montarFiltros(){
  const loterias = [...new Set(todosResultados.map(r => r.loteria).filter(Boolean))].sort();

  const valorAtual = select.value;

  select.innerHTML = `<option value="todas">Todas as loterias</option>`;

  loterias.forEach(nome => {
    const opt = document.createElement("option");
    opt.value = nome;
    opt.textContent = nome;
    select.appendChild(opt);
  });

  if(valorAtual === "todas" || loterias.includes(valorAtual)){
    select.value = valorAtual;
  }

  const principais = ["todas","PT-SP","PT-RIO","LOOK LOTERIAS","BANDEIRANTES","LOTECE","MALUCA BAHIA","BOA SORTE GOIÁS"];

  tags.innerHTML = principais.map((nome, i) => `
    <div class="tag ${i === 0 ? "active" : ""}" onclick="filtrarRapido('${nome}', this)">
      ${nome === "todas" ? "Todas" : nome}
    </div>
  `).join("");
}

select.addEventListener("change", aplicarFiltro);

const q = query(collection(db, "resultados"));

onSnapshot(q, snap => {
  todosResultados = limparDocumentosInvalidos(
    snap.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }))
  );

  montarFiltros();

  statusEl.innerHTML =
    "Última atualização da tela: " + new Date().toLocaleString("pt-BR");

  aplicarFiltro();
}, err => {
  console.error(err);
  statusEl.textContent = "Erro ao carregar resultados.";
});
</script>

</body>
</html>
