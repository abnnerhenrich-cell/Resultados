<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Resultados das Loterias</title>

<style>

:root{
  --bg:#020617;
  --card:#071b38;
  --card2:#0d2b5c;
  --blue:#00c8ff;
  --green:#39ff9b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --line:rgba(255,255,255,.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(180deg,#020617,#000);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
}

header{
  padding:24px 16px;
  text-align:center;
  border-bottom:1px solid var(--line);
  background:rgba(0,0,0,.3);
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter:blur(10px);
}

header h1{
  color:var(--blue);
  font-size:32px;
  text-shadow:0 0 15px rgba(0,200,255,.7);
}

.sub{
  color:var(--muted);
  margin-top:8px;
}

.container{
  width:min(1200px,100%);
  margin:auto;
  padding:20px;
}

.toolbar{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

select{
  flex:1;
  min-width:240px;
  background:var(--card);
  color:white;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  font-size:15px;
}

button{
  border:none;
  border-radius:14px;
  padding:14px 18px;
  font-weight:bold;
  background:linear-gradient(135deg,var(--blue),var(--green));
  cursor:pointer;
}

.status{
  margin-top:10px;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:16px;
}

.card{
  background:linear-gradient(180deg,var(--card2),var(--card));
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card h2{
  color:var(--green);
  font-size:22px;
  margin-bottom:10px;
  text-shadow:0 0 12px rgba(57,255,155,.6);
}

.meta{
  color:var(--muted);
  font-size:13px;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,.08);
}

th{
  color:var(--blue);
}

.milhar{
  font-size:20px;
  font-weight:900;
  color:white;
  text-shadow:0 0 12px rgba(255,255,255,.7);
}

.empty{
  text-align:center;
  padding:40px;
  border:1px dashed var(--line);
  border-radius:18px;
  color:var(--muted);
}

footer{
  text-align:center;
  padding:30px;
  color:var(--muted);
  font-size:12px;
}

</style>
</head>

<body>

<header>
  <h1>Resultados das Loterias</h1>
  <div class="sub">
    Atualização automática em tempo real
  </div>
</header>

<div class="container">

  <div class="toolbar">

    <select id="filtroLoteria">

      <option value="todos">Todas as loterias</option>

      <option value="LOTERIA TRADICIONAL">LOTERIA TRADICIONAL</option>

      <option value="Loteria Nacional">Loteria Nacional</option>

      <option value="MALUCA">MALUCA Bahia</option>

      <option value="PARATODOS BAHIA">PARATODOS BAHIA</option>

      <option value="LOTECE">LOTECE</option>

      <option value="PARATODOS">PARATODOS CEARÁ</option>

      <option value="LBR">LBR</option>

      <option value="BOA SORTE">BOA SORTE GOIÁS</option>

      <option value="LOOK">LOOK LOTERIAS</option>

      <option value="MINAS">MINAS MG</option>

      <option value="CAMPINA GRANDE">CAMPINA GRANDE PB</option>

      <option value="LOTEP">LOTEP</option>

      <option value="PARATODOS PB">PARATODOS PB</option>

      <option value="AVAL">AVAL Pernambuco</option>

      <option value="CAMINHO DA SORTE">CAMINHO DA SORTE</option>

      <option value="LOTERIA POPULAR">LOTERIA POPULAR</option>

      <option value="NORDESTE">NORDESTE MONTE CARLOS</option>

      <option value="PT-RIO">PT-RIO</option>

      <option value="Base Premia">Base Premia RN</option>

      <option value="Bicho RS">Bicho RS</option>

      <option value="ABAESE">ABAESE ITABAIANA</option>

      <option value="BANDEIRANTES">BANDEIRANTES</option>

      <option value="PT-SP">PT-SP</option>

    </select>

    <button onclick="location.reload()">
      Atualizar
    </button>

  </div>

  <div class="status" id="status">
    Carregando resultados...
  </div>

  <br>

  <div class="grid" id="resultados"></div>

</div>

<footer>
  Fonte: resultadofacil.com.br
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyC6iyfXbCt-fHL5Wt5zNS5myKq-njJzbms",
  authDomain: "resultados-loterias-3979a.firebaseapp.com",
  projectId: "resultados-loterias-3979a",
  storageBucket: "resultados-loterias-3979a.appspot.com",
  messagingSenderId: "109416331388",
  appId: "1:109416331388:web:8e04783520d08adc87b1f9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const container = document.getElementById("resultados");

const status = document.getElementById("status");

const filtro = document.getElementById("filtroLoteria");

let todosResultados = [];

function escapeHtml(text){

  return String(text || "")
  .replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));

}

function render(){

  const valor = filtro.value;

  let filtrados = todosResultados;

  if(valor !== "todos"){

    filtrados = todosResultados.filter(r =>
      r.titulo.toLowerCase().includes(valor.toLowerCase())
    );

  }

  if(!filtrados.length){

    container.innerHTML = `
      <div class="empty">
        Nenhum resultado encontrado.
      </div>
    `;

    return;
  }

  container.innerHTML = filtrados.map(item => {

    let premios = [];

    try{

      premios = JSON.parse(item.premios);

    }catch(e){}

    return `
      <div class="card">

        <h2>${escapeHtml(item.titulo)}</h2>

        <div class="meta">
          ${escapeHtml(item.data)}
        </div>

        <table>

          <thead>
            <tr>
              <th>Prêmio</th>
              <th>Milhar</th>
              <th>Bicho</th>
            </tr>
          </thead>

          <tbody>

            ${premios.map(p => `
              <tr>
                <td>${escapeHtml(p.posicao)}</td>
                <td class="milhar">${escapeHtml(p.milhar)}</td>
                <td>${escapeHtml(p.bicho)}</td>
              </tr>
            `).join("")}

          </tbody>

        </table>

      </div>
    `;

  }).join("");

}

filtro.addEventListener("change", render);

onSnapshot(collection(db, "resultados"), snap => {

  todosResultados = snap.docs.map(doc => ({
    id:doc.id,
    ...doc.data()
  }));

  status.innerHTML =
    "Última atualização: " +
    new Date().toLocaleString("pt-BR");

  render();

});

</script>

</body>
</html>
